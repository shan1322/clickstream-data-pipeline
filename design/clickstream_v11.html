<!DOCTYPE html>
<html><head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);background:transparent;padding:12px 8px}
h2{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
button{font-size:10px;padding:3px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer}
.node{display:flex;flex-direction:column;align-items:center;gap:3px;position:absolute}
.card{width:64px;height:56px;border-radius:10px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.card svg{width:28px;height:28px}
.lbl{font-size:8.5px;font-weight:500;color:var(--color-text-primary);text-align:center;line-height:1.2;width:72px}
.sub{font-size:7px;color:var(--color-text-secondary);text-align:center;line-height:1.2;width:72px}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ha{display:flex;flex-direction:column;align-items:center;position:absolute;gap:1px}
.ht{font-size:7px;color:var(--color-text-tertiary);white-space:nowrap}
.hr{display:flex;align-items:center}
.hl{width:26px;height:2px;border-radius:1px;position:relative;overflow:hidden}
.hf{position:absolute;top:0;left:-100%;width:100%;height:100%;animation:hf 1.1s linear infinite;border-radius:1px}
@keyframes hf{0%{left:-100%}100%{left:100%}}
.hd{font-size:9px;color:var(--color-text-tertiary)}
.stop .hf,.stop .pulse{animation-play-state:paused}
</style>
</head><body>
<div id="root">
<h2>Clickstream data pipeline <button onclick="tog()">⏸ Pause</button></h2>

<!--
Layout (card 64px wide, height 56px + 3px gap + ~18px text = ~80px total node height):
ROW1 y=0:   Locust cx=56, ALB cx=160, ECS cx=264, Kafka cx=368
ROW2 y=110: Spark cx=368
ROW3 y=220: OpenSearch cx=192, S3 cx=528
ROW4 y=330: Kibana cx=192, Airflow cx=528
ROW5 y=440: Redshift cx=528

Line coords (cx, top=y, bot=y+80):
Kafka  bot=190  Spark top=110  → line y1=190 y2=110... wait top>bot so:
Card top = row_y, card bot = row_y+56
-->

<div id="grid" style="position:relative;width:100%;height:540px">

<!-- ROW1 y=0 -->
<div class="node pulse" id="n0" style="left:20px;top:0">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><rect x="2" y="6" width="24" height="16" rx="2" fill="#FF6D00" fill-opacity=".12" stroke="#FF6D00" stroke-width="1.3"/><rect x="4" y="9" width="6" height="4" rx="1" fill="#FF6D00" opacity=".7"/><rect x="12" y="9" width="6" height="4" rx="1" fill="#FF6D00" opacity=".4"/><rect x="4" y="15" width="18" height="1.5" rx=".75" fill="#FF6D00" opacity=".3"/></svg></div>
  <div class="lbl">Locust</div><div class="sub">10K–100K users</div>
</div>
<div class="ha" style="left:92px;top:22px">
  <div class="ht">HTTP</div><div class="hr"><div class="hl"><div class="hf" style="background:#FF6D00"></div></div><span class="hd">▶</span></div>
</div>
<div class="node" id="n1" style="left:120px;top:0">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="10" fill="#8C4FFF" fill-opacity=".1" stroke="#8C4FFF" stroke-width="1.3"/><circle cx="14" cy="8" r="1.8" fill="#8C4FFF"/><circle cx="20" cy="18" r="1.8" fill="#8C4FFF"/><circle cx="8" cy="18" r="1.8" fill="#8C4FFF"/><line x1="14" y1="9.8" x2="19" y2="16.2" stroke="#8C4FFF" stroke-width="1.1"/><line x1="14" y1="9.8" x2="9" y2="16.2" stroke="#8C4FFF" stroke-width="1.1"/></svg></div>
  <div class="lbl">AWS ALB</div><div class="sub">Load balancer</div>
</div>
<div class="ha" style="left:192px;top:22px">
  <div class="ht">route</div><div class="hr"><div class="hl"><div class="hf" style="background:#8C4FFF"></div></div><span class="hd">▶</span></div>
</div>
<div class="node pulse" id="n2" style="left:220px;top:0">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="4" fill="#FF9900" fill-opacity=".07"/><rect x="5" y="5" width="8" height="7" rx="1.5" fill="#FF9900" opacity=".5"/><rect x="15" y="5" width="8" height="7" rx="1.5" fill="#FF9900" opacity=".3"/><rect x="5" y="14" width="18" height="4" rx="1.5" fill="#FF9900" opacity=".2"/></svg></div>
  <div class="lbl">ECS Fargate</div><div class="sub">FastAPI · auto-scale</div>
</div>
<div class="ha" style="left:292px;top:22px">
  <div class="ht">SSL 9094</div><div class="hr"><div class="hl"><div class="hf" style="background:#E91E63"></div></div><span class="hd">▶</span></div>
</div>
<div class="node pulse" id="n3" style="left:320px;top:0">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="5" r="3" fill="#231F20" fill-opacity=".75" stroke="#231F20" stroke-width="1"/><circle cx="5" cy="21" r="3" fill="#231F20" fill-opacity=".5" stroke="#231F20" stroke-width="1"/><circle cx="23" cy="21" r="3" fill="#231F20" fill-opacity=".5" stroke="#231F20" stroke-width="1"/><line x1="14" y1="8" x2="5" y2="18" stroke="#231F20" stroke-width="1.4"/><line x1="14" y1="8" x2="23" y2="18" stroke="#231F20" stroke-width="1.4"/><line x1="5" y1="21" x2="23" y2="21" stroke="#231F20" stroke-width="1" stroke-dasharray="2 1.5"/></svg></div>
  <div class="lbl">AWS MSK</div><div class="sub">Kafka · 3 brokers</div>
</div>

<!-- ROW2 y=110: Spark cx=352 -->
<div class="node pulse" id="n4" style="left:320px;top:110px">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><ellipse cx="14" cy="14" rx="11" ry="6" fill="#E25A1C" fill-opacity=".1" stroke="#E25A1C" stroke-width="1.3"/><circle cx="8" cy="11" r="1.3" fill="#E25A1C" opacity=".8"/><circle cx="20" cy="11" r="1.3" fill="#E25A1C" opacity=".8"/><circle cx="8" cy="17" r="1.3" fill="#E25A1C" opacity=".5"/><circle cx="20" cy="17" r="1.3" fill="#E25A1C" opacity=".5"/><circle cx="14" cy="9" r="1.3" fill="#E25A1C"/><circle cx="14" cy="19" r="1.3" fill="#E25A1C" opacity=".6"/></svg></div>
  <div class="lbl">EMR Spark</div><div class="sub">Streaming</div>
</div>

<!-- ROW3 y=220: OpenSearch cx=160, S3 cx=496 -->
<div class="node pulse" id="n5" style="left:128px;top:220px">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="10" fill="#005571" fill-opacity=".1" stroke="#005571" stroke-width="1.3"/><circle cx="14" cy="11" r="3.5" fill="#FEC514" opacity=".9"/><rect x="6" y="17" width="16" height="2.2" rx="1.1" fill="#005571" opacity=".6"/><rect x="8" y="21" width="12" height="1.8" rx=".9" fill="#005571" opacity=".35"/></svg></div>
  <div class="lbl">OpenSearch</div><div class="sub">5s · live index</div>
</div>
<div class="node" id="n6" style="left:464px;top:220px">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><path d="M4 8 L14 4 L24 8 L24 20 L14 24 L4 20Z" fill="#569A31" fill-opacity=".12" stroke="#569A31" stroke-width="1.3"/><path d="M4 8 L14 12 L24 8" stroke="#569A31" stroke-width="1"/><line x1="14" y1="12" x2="14" y2="24" stroke="#569A31" stroke-width="1"/></svg></div>
  <div class="lbl">Amazon S3</div><div class="sub">30s · Parquet</div>
</div>

<!-- ROW4 y=330: Kibana cx=160, Airflow cx=496 -->
<div class="node" id="n7" style="left:128px;top:330px">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><rect x="3" y="3" width="22" height="22" rx="4" fill="#00BFB3" fill-opacity=".1" stroke="#00BFB3" stroke-width="1.3"/><line x1="8" y1="7" x2="8" y2="21" stroke="#00BFB3" stroke-width="2" stroke-linecap="round"/><path d="M8 14 L20 7" stroke="#F04E98" stroke-width="1.6" stroke-linecap="round"/><path d="M8 14 L20 21" stroke="#FEC514" stroke-width="1.6" stroke-linecap="round"/></svg></div>
  <div class="lbl">Kibana</div><div class="sub">Live dashboard</div>
</div>
<div class="node pulse" id="n8" style="left:464px;top:330px">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="10" fill="#017CEE" fill-opacity=".1" stroke="#017CEE" stroke-width="1.3"/><path d="M9 14 Q14 7 19 14 Q14 21 9 14Z" fill="#017CEE" opacity=".2"/><circle cx="14" cy="14" r="2.2" fill="#017CEE" opacity=".8"/><circle cx="14" cy="6" r="1.3" fill="#017CEE" opacity=".5"/><circle cx="21" cy="18" r="1.3" fill="#017CEE" opacity=".5"/><circle cx="7" cy="18" r="1.3" fill="#017CEE" opacity=".5"/></svg></div>
  <div class="lbl">Airflow</div><div class="sub">ETL · hourly DAG</div>
</div>

<!-- ROW5 y=440: Redshift cx=496 -->
<div class="node" id="n9" style="left:464px;top:440px">
  <div class="card"><svg viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="4" fill="#2053B5" fill-opacity=".07"/><ellipse cx="14" cy="8" rx="7" ry="3" fill="#2053B5" fill-opacity=".2" stroke="#2053B5" stroke-width="1.3"/><path d="M7 8 L7 20 Q7 23 14 23 Q21 23 21 20 L21 8" fill="#2053B5" fill-opacity=".05" stroke="#2053B5" stroke-width="1.3"/><line x1="7" y1="14" x2="21" y2="14" stroke="#2053B5" stroke-width=".8" stroke-dasharray="2 1.5"/></svg></div>
  <div class="lbl">Redshift</div><div class="sub">Sessions table</div>
</div>

<!-- SVG lines
card cx = left+32, card top = top, card bot = top+56
n3(kafka): cx=352, bot=56
n4(spark): cx=352, top=110, bot=166
n5(os):    cx=160, top=220, bot=276
n6(s3):    cx=496, top=220, bot=276
n7(kibana):cx=160, top=330
n8(airflow):cx=496, top=330, bot=386
n9(redshift):cx=496, top=440
-->
<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible">
  <defs>
    <marker id="ah" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 1L7 4L1 7" fill="none" stroke="rgba(140,140,140,0.7)" stroke-width="1.5"/>
    </marker>
  </defs>
  <!-- kafka→spark -->
  <line x1="352" y1="56" x2="352" y2="110" stroke="rgba(140,140,140,0.35)" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- spark→opensearch -->
  <line x1="352" y1="166" x2="160" y2="220" stroke="rgba(140,140,140,0.35)" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- spark→s3 -->
  <line x1="352" y1="166" x2="496" y2="220" stroke="rgba(140,140,140,0.35)" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- opensearch→kibana -->
  <line x1="160" y1="276" x2="160" y2="330" stroke="rgba(140,140,140,0.35)" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- s3→airflow -->
  <line x1="496" y1="276" x2="496" y2="330" stroke="rgba(140,140,140,0.35)" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- airflow→redshift -->
  <line x1="496" y1="386" x2="496" y2="440" stroke="rgba(140,140,140,0.35)" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- animated dots -->
  <circle id="d0" r="4" fill="#E91E63"/><circle id="d1" r="4" fill="#FEC514"/>
  <circle id="d2" r="4" fill="#569A31"/><circle id="d3" r="4" fill="#00BFB3"/>
  <circle id="d4" r="4" fill="#017CEE"/><circle id="d5" r="4" fill="#2053B5"/>
</svg>

</div>
</div>

<script>
let on=true;
function tog(){
  on=!on;
  document.getElementById('root').classList.toggle('stop',!on);
  document.querySelector('button').textContent=on?'⏸ Pause':'▶ Resume';
}
const P=[
  {id:'d0',x1:352,y1:56, x2:352,y2:110,off:0},
  {id:'d1',x1:352,y1:166,x2:160,y2:220,off:0.25},
  {id:'d2',x1:352,y1:166,x2:496,y2:220,off:0.55},
  {id:'d3',x1:160,y1:276,x2:160,y2:330,off:0.1},
  {id:'d4',x1:496,y1:276,x2:496,y2:330,off:0.4},
  {id:'d5',x1:496,y1:386,x2:496,y2:440,off:0.7}
];
function anim(t){
  P.forEach(p=>{
    const el=document.getElementById(p.id);
    if(on){
      const f=((t*0.0004+p.off)%1+1)%1;
      el.setAttribute('cx',p.x1+(p.x2-p.x1)*f);
      el.setAttribute('cy',p.y1+(p.y2-p.y1)*f);
      el.setAttribute('opacity','0.95');
    } else el.setAttribute('opacity','0');
  });
  requestAnimationFrame(anim);
}
requestAnimationFrame(anim);
</script>
</body></html>
